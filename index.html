<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal de Provas IFBA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-green-700 mb-2">Provas - IFBA Euclides</h1>
        <p id="atualizacao" class="text-sm text-gray-500 mb-6"></p>

        <div id="lista-provas" class="grid gap-4">
            <!-- As provas aparecerão aqui -->
        </div>
    </div>

    <script>
        // Carrega o arquivo JSON gerado pelo Python
        fetch('dados_provas.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('atualizacao').innerText = "Atualizado em: " + data.ultima_atualizacao;
                const container = document.getElementById('lista-provas');
                
                data.dados.forEach(turma => {
                    let html = `<div class="bg-white p-4 rounded-lg shadow">
                                    <h2 class="text-xl font-bold border-b pb-2 mb-3">${turma.turma}</h2>
                                    <ul>`;
                    turma.provas.forEach(p => {
                        html += `<li class="flex justify-between py-1 text-gray-700">
                                    <span>${p.disciplina}</span>
                                    <span class="font-mono bg-gray-200 px-2 rounded">${p.data}</span>
                                 </li>`;
                    });
                    html += `</ul></div>`;
                    container.innerHTML += html;
                });
            });
    </script>
</body>
</html>
